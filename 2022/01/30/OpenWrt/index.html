<p><a target="_blank" rel="noopener" href="https://github.com/coolsnowwolf/lede">github</a></p>
<figure class="highlight vim"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line">不要用 root 用户进行编译！！！</span><br><span class="line">国内用户编译前最好准备好梯子</span><br><span class="line">默认登陆IP <span class="number">192.168</span>.<span class="number">1.1</span> 密码 password</span><br><span class="line">编译命令如下:</span><br><span class="line">首先装好 Ubuntu <span class="number">64</span>bit，推荐 Ubuntu <span class="number">20.04</span> LTS x64</span><br><span class="line"></span><br><span class="line">命令行输入 sudo apt-<span class="built_in">get</span> <span class="keyword">update</span> ，然后输入 sudo apt-<span class="built_in">get</span> -<span class="keyword">y</span> install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch <span class="keyword">python3</span> python2.<span class="number">7</span> unzip zlib1g-dev lib32gcc1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.<span class="number">0</span>-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-<span class="keyword">compiler</span> g++-multilib antlr3 gperf wget curl swig rsync</span><br><span class="line"></span><br><span class="line">使用 git clone http<span class="variable">s:</span>//github.<span class="keyword">com</span>/coolsnowwolf/lede 命令下载好源代码，然后 <span class="keyword">cd</span> lede 进入目录</span><br><span class="line"></span><br><span class="line">./scripts/feeds <span class="keyword">update</span> -<span class="keyword">a</span></span><br><span class="line">./scripts/feeds install -<span class="keyword">a</span></span><br><span class="line"><span class="keyword">make</span> menuconfig</span><br><span class="line"><span class="keyword">make</span> -j8 download V=s 下载<span class="keyword">dl</span>库（国内请尽量全局科学上网）</span><br><span class="line"></span><br><span class="line">输入 <span class="keyword">make</span> -j1 V=s （-j1 后面是线程数。第一次编译推荐用单线程）即可开始编译你要的固件了。</span><br><span class="line"></span><br><span class="line">本套代码保证肯定可以编译成功。里面包括了 R21 所有源代码，包括 IPK 的。</span><br></pre></td></tr></table></figure>

<script>
  window.addEventListener('tabs:register', () => {
    let { activeClass } = CONFIG.comments;
    if (CONFIG.comments.storage) {
      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>
